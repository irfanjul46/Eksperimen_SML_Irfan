name: Automated Data Preprocessing

on:
  push:
    branches:
      - main
    paths:
      - 'namadataset_raw/**'
      - 'preprocessing/automate_Nama-siswa.py'

jobs:
  run-preprocessing:
    runs-on: ubuntu-latest

    steps:
    # 1. Checkout repositori Anda agar kodenya bisa diakses oleh GitHub Actions Runner
    - name: Checkout Repository
      uses: actions/checkout@v3

    # 2. Setup lingkungan Python
    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.10'

    # 3. Install pustaka (dependencies) yang dibutuhkan oleh script kita
    - name: Install Dependencies
      run: |
        python -m pip install --upgrade pip
        pip install pandas numpy scikit-learn

    # 4. Jalankan script otomatisasi preprocessing
    - name: Run Preprocessing Script
      run: |
        python preprocessing/automate_Nama-siswa.py

    # 5. Commit kembali data bersih (football_cleaned.csv) ke repositori Anda secara otomatis
    - name: Commit and Push Cleaned Dataset
      run: |
        git config --local user.email "action@github.com"
        git config --local user.name "GitHub Action"
        git add preprocessing/football_cleaned.csv
        # Cek jika ada perubahan sebelum melakukan commit agar tidak error
        git diff --quiet && git diff --staged --quiet || (git commit -m "Umpan Balik Otomatis: Memperbarui dataset preprocessing" && git push)